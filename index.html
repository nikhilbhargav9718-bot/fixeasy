<!DOCTYPE html>
<html>
<head>
<title>FixEasy Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
header{background:#020617;padding:15px;text-align:center;font-size:22px;}
.box{background:#1e293b;margin:15px;padding:15px;border-radius:10px;}
input,select,button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:6px;}
button{background:#22c55e;color:white;font-weight:bold;}
table{width:100%;margin-top:10px;}
td{padding:6px;border-bottom:1px solid #444;}
.admin{display:none;}
</style>
</head>

<body>

<header>🔧 FixEasy Pro</header>

<div id="notify" style="display:none;background:#22c55e;padding:10px;text-align:center;">
🔔 New Booking Available
</div>

<div class="box">
<h3>🔐 Login</h3>

<select id="role">
<option value="customer">Customer</option>
<option value="technician">Technician</option>
<option value="admin">Admin</option>
</select>

<input id="loginPhone" placeholder="Phone">
<input id="loginPass" placeholder="Password">

<button onclick="loginUser()">Login</button>
<button onclick="registerUser()">Register</button>
<button onclick="logout()">Logout</button>

<p id="msg"></p>
</div>

<div class="box" id="bookingBox">
<h3>📲 Book Service</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<select id="service">
<option>AC Repair</option>
<option>AC Gas Filling</option>
<option>Fridge Repair</option>
<option>Washing Machine</option>
<option>Geyser</option>
</select>

<input id="address" placeholder="Address">
<button onclick="book()">Submit Booking</button>

<p>₹250 Visiting Charge</p>
</div>

<div class="box">
<h3>📜 My Bookings</h3>
<table id="history"></table>
</div>

<div class="box admin" id="adminPanel">
<h3>👑 Admin Panel</h3>
<button onclick="show()">Show Bookings</button>
<button onclick="showUsers()">Show Technicians</button>
<table id="table"></table>
</div>

<div class="box admin" id="techPanel">
<h3>👨‍🔧 Technician Panel</h3>
<h3>Total Earnings: ₹<span id="earn">0</span></h3>
<table id="myjobs"></table>
</div>

<script>

// ===== DATA =====
let adminPhone="9718567385";
let adminPass="DL8SDM0339";

let users=JSON.parse(localStorage.getItem("users"))||[];
let bookings=JSON.parse(localStorage.getItem("data"))||[];

let visitingCharge=250;

// ===== REGISTER =====
function registerUser(){

if(!loginPhone.value || !loginPass.value){
msg.innerText="Fill all ❌"; return;
}

let exist=users.find(x=>x.phone==loginPhone.value);
if(exist){
msg.innerText="User exists ❌"; return;
}

let approved=role.value=="technician"?false:true;

users.push({
phone:loginPhone.value,
pass:loginPass.value,
role:role.value,
approved:approved
});

localStorage.setItem("users",JSON.stringify(users));

msg.innerText=role.value=="technician"?"Wait for approval ❌":"Registered ✅";
}

// ===== LOGIN =====
function loginUser(){

// hide all first
adminPanel.style.display="none";
techPanel.style.display="none";
bookingBox.style.display="none";

if(role.value=="admin"){
if(loginPhone.value==adminPhone && loginPass.value==adminPass){

localStorage.setItem("role","admin");

adminPanel.style.display="block";
show();

return;
}else{
msg.innerText="Wrong ❌"; return;
}
}

let u=users.find(x=>x.phone==loginPhone.value && x.pass==loginPass.value && x.role==role.value);

if(!u){ msg.innerText="Wrong ❌"; return; }

if(u.role=="technician" && !u.approved){
msg.innerText="Not approved ❌"; return;
}

localStorage.setItem("currentUser",JSON.stringify(u));

if(u.role=="technician"){
localStorage.setItem("role","technician");
techPanel.style.display="block";
showMyJobs();
}else{
localStorage.removeItem("role");
bookingBox.style.display="block";
}
}

// ===== LOGOUT =====
function logout(){
localStorage.clear();
location.reload();
}

// ===== BOOK =====
function book(){

let role=localStorage.getItem("role");

if(role=="admin"||role=="technician"){
alert("Not allowed ❌"); return;
}

if(!name.value||!phone.value||!address.value){
alert("Fill all ❌"); return;
}

bookings.push({
name:name.value,
phone:phone.value,
service:service.value,
amount:500,
tech:"",
status:"Pending",
labour:0,
part:"",
extra:0
});

localStorage.setItem("data",JSON.stringify(bookings));

showNotification();
showHistory();

name.value=""; phone.value=""; address.value="";
}

// ===== HISTORY =====
function showHistory(){
let html="<tr><td>Service</td><td>Status</td></tr>";

bookings.forEach(b=>{
if(b.phone==phone.value){
html+=`<tr><td>${b.service}</td><td>${b.status}</td></tr>`;
}
});

history.innerHTML=html;
}

// ===== ADMIN =====
function show(){
let html="<tr><td>Name</td><td>Service</td><td>Status</td><td>Tech</td></tr>";

bookings.forEach(b=>{
html+=`<tr>
<td>${b.name}</td>
<td>${b.service}</td>
<td>${b.status}</td>
<td>${b.tech||"Not Assigned"}</td>
</tr>`;
});

table.innerHTML=html;
}

function showUsers(){
let html="<tr><td>Phone</td><td>Status</td><td>Action</td></tr>";

users.forEach((u,i)=>{
if(u.role=="technician"){
html+=`<tr>
<td>${u.phone}</td>
<td>${u.approved?"Approved":"Pending"}</td>
<td>${!u.approved?`<button onclick="approve(${i})">Approve</button>`:""}</td>
</tr>`;
}
});

table.innerHTML=html;
}

function approve(i){
users[i].approved=true;
localStorage.setItem("users",JSON.stringify(users));
alert("Approved ✅");
showUsers();
}

// ===== TECH =====
function showMyJobs(){

let u=JSON.parse(localStorage.getItem("currentUser"));
let html="";
let total=0;

bookings.forEach((b,i)=>{

if(!b.tech){
html+=`<tr>
<td>${b.name}</td>
<td>${b.service}</td>
<td><button onclick="takeJob(${i})">Accept</button></td>
</tr>`;
}

if(b.tech==u.phone){

total += (b.labour + b.extra);

html+=`<tr>
<td>${b.name}</td>
<td>${b.service}</td>
<td>
Assigned ✅<br>

<input id="labour${i}" placeholder="Labour">
<input id="part${i}" placeholder="Part">
<input id="cost${i}" placeholder="Cost">

<button onclick="addCharges(${i})">Add</button>
<button onclick="makeBill(${i})">Bill</button>

</td>
</tr>`;
}

});

earn.innerText=total;
myjobs.innerHTML=html;
}

function takeJob(i){

let u=JSON.parse(localStorage.getItem("currentUser"));

if(bookings[i].tech){
alert("Already taken ❌"); return;
}

bookings[i].tech=u.phone;
bookings[i].status="Assigned";

localStorage.setItem("data",JSON.stringify(bookings));

showMyJobs();
}

// ===== CHARGES =====
function addCharges(i){

let labour=parseInt(document.getElementById("labour"+i).value)||0;
let part=document.getElementById("part"+i).value||"No Part";
let cost=parseInt(document.getElementById("cost"+i).value)||0;

if(labour==0 && cost==0){
alert("Enter charges ❌"); return;
}

bookings[i].labour=labour;
bookings[i].part=part;
bookings[i].extra=cost;

localStorage.setItem("data",JSON.stringify(bookings));

alert("Added ✅");
showMyJobs();
}

// ===== BILL =====
function makeBill(i){

let b=bookings[i];

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

let labour=b.labour||0;
let extra=b.extra||0;
let part=b.part||"No Part";

let total;

if(labour>0 || extra>0){
total = labour + extra - visitingCharge;
}else{
total = visitingCharge;
}

if(total<0){ total=0; }

doc.text("FixEasy Service Bill",20,20);

doc.text("Name: "+b.name,20,40);
doc.text("Phone: "+b.phone,20,50);
doc.text("Service: "+b.service,20,60);

doc.text("Labour: ₹"+labour,20,80);
doc.text("Part: "+part,20,90);
doc.text("Part Cost: ₹"+extra,20,100);

doc.text("Visiting Adjust: -₹250",20,110);

doc.text("Total: ₹"+total,20,130);

doc.text("Technician: "+(b.tech||"N/A"),20,150);
doc.text("Date: "+new Date().toLocaleDateString(),20,160);

doc.save("FixEasy_Bill.pdf");
}

// ===== NOTIFICATION =====
function showNotification(){
let n=document.getElementById("notify");
n.style.display="block";
setTimeout(()=>{n.style.display="none";},3000);
}

// ===== AUTO UPDATE =====
setInterval(()=>{
let role=localStorage.getItem("role");

if(role=="technician"){ showMyJobs(); }
if(role=="admin"){ show(); }

},3000);

// ===== LOAD =====
window.onload=function(){

adminPanel.style.display="none";
techPanel.style.display="none";
bookingBox.style.display="none";

let role=localStorage.getItem("role");

if(role=="admin"){
adminPanel.style.display="block";
show();
}
else if(role=="technician"){
techPanel.style.display="block";
showMyJobs();
}
else{
bookingBox.style.display="block";
}

}

</script>

</body>
</html>
