<!DOCTYPE html>
<html>
<head>
<title>FixEasy Final</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
header{background:#020617;padding:15px;text-align:center;font-size:22px;}
.box{background:#1e293b;margin:15px;padding:15px;border-radius:10px;}
input,select,button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:6px;}
button{background:#22c55e;color:white;font-weight:bold;}
table{width:100%;margin-top:10px;}
td{padding:6px;border-bottom:1px solid #444;}
.admin{display:none;} /* Pehle se hi hidden tha */
.hidden{display:none !important;} /* Extra protection */
</style>
</head>

<body>

<header>🔧 FixEasy Final</header>

<!-- LOGIN - HAMESHA VISIBLE -->
<div class="box">
<h3>🔐 Login / Register</h3>
<select id="role">
<option value="customer">Customer</option>
<option value="technician">Technician</option>
<option value="admin">Admin</option>
</select>
<input id="loginPhone" placeholder="Phone">
<input id="loginPass" placeholder="Password" type="password">
<button onclick="loginUser()">Login</button>
<button onclick="registerUser()">Register</button>
<button onclick="logout()">Logout</button>
<p id="msg"></p>
</div>

<!-- BOOKING - HAMESHA VISIBLE -->
<div class="box" id="bookingBox">
<h3>📲 Book Service</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<select id="service">
<option>AC Repair</option>
<option>AC Gas Filling</option>
<option>Fridge Repair</option>
<option>Washing Machine</option>
<option>Geyser</option>
</select>
<input id="address" placeholder="Address">
<button onclick="book()">Submit Booking</button>
<p>₹250 Visiting Charge</p>
</div>

<!-- ADMIN PANEL - SIRF LOGIN KE BAAD -->
<div class="box admin hidden" id="adminPanel">
<h3>👑 Admin Panel</h3>
<button onclick="showBookings()">📋 Show Bookings</button>
<button onclick="showUsers()">👥 Show Technicians</button>
<table id="table"></table>
</div>

<!-- TECH PANEL - SIRF LOGIN KE BAAD -->
<div class="box admin hidden" id="techPanel">
<h3>👨‍🔧 Technician Panel</h3>
<h3>Total Earnings: ₹<span id="earn">0</span></h3>
<table id="myjobs"></table>
</div>

<script>
// ===== DATA =====
let adminPhone="9718567385";
let adminPass="DL8SDM0339";

let users=JSON.parse(localStorage.getItem("users"))||[];
let bookings=JSON.parse(localStorage.getItem("data"))||[];

let visitingCharge=250;

// ===== REGISTER =====
function registerUser(){
if(!loginPhone.value || !loginPass.value){msg.innerText="Fill all ❌"; return;}
let exist=users.find(x=>x.phone==loginPhone.value);
if(exist){msg.innerText="User exists ❌"; return;}
let approved=role.value=="technician"?false:true;
users.push({phone:loginPhone.value,pass:loginPass.value,role:role.value,approved:approved});
localStorage.setItem("users",JSON.stringify(users));
msg.innerText=role.value=="technician"?"Wait for approval ❌":"Registered ✅";
}

// ===== LOGIN - FIXED VERSION =====
function loginUser(){
    // SAB PANELS HIDE KARO
    document.getElementById("adminPanel").classList.add("hidden");
    document.getElementById("techPanel").classList.add("hidden");
    
    let enteredRole = role.value;
    let enteredPhone = loginPhone.value;
    let enteredPass = loginPass.value;
    
    msg.innerText = ""; // Clear previous message
    
    // ADMIN LOGIN
    if(enteredRole == "admin"){
        if(enteredPhone == adminPhone && enteredPass == adminPass){
            localStorage.setItem("role", "admin");
            localStorage.setItem("currentUser", JSON.stringify({phone:adminPhone, role:"admin"}));
            document.getElementById("adminPanel").classList.remove("hidden");
            showBookings();
            msg.innerText = "Welcome Admin ✅";
            return;
        } else {
            msg.innerText = "Wrong Admin Credentials ❌";
            return;
        }
    }
    
    // NORMAL USER LOGIN
    let user = users.find(x => x.phone == enteredPhone && x.pass == enteredPass && x.role == enteredRole);
    
    if(!user){
        msg.innerText = "Wrong Credentials ❌";
        return;
    }
    
    if(user.role == "technician" && !user.approved){
        msg.innerText = "Not approved yet ❌";
        return;
    }
    
    localStorage.setItem("currentUser", JSON.stringify(user));
    
    // SHOW CORRECT PANEL
    if(user.role == "technician"){
        localStorage.setItem("role", "technician");
        document.getElementById("techPanel").classList.remove("hidden");
        showMyJobs();
        msg.innerText = "Welcome Technician ✅";
    } else {
        localStorage.removeItem("role"); // Customer
        msg.innerText = "Welcome Customer ✅";
    }
}

// ===== LOGOUT =====
function logout(){
    localStorage.clear();
    // SAB PANELS HIDE
    document.getElementById("adminPanel").classList.add("hidden");
    document.getElementById("techPanel").classList.add("hidden");
    msg.innerText = "Logged out ✅";
    // Clear inputs
    loginPhone.value = "";
    loginPass.value = "";
}

// ===== BOOK SERVICE =====
function book(){
    let role = localStorage.getItem("role");
    if(role == "admin" || role == "technician"){
        alert("Login as Customer to book ❌");
        return;
    }
    
    if(!name.value || !phone.value || !address.value){
        alert("Fill all fields ❌");
        return;
    }
    
    bookings.push({
        name: name.value,
        phone: phone.value,
        service: service.value,
        tech: "",
        status: "Pending",
        labour: 0,
        part: "",
        extra: 0
    });
    
    localStorage.setItem("data", JSON.stringify(bookings));
    alert("Booking Done ✅");
    name.value = ""; 
    phone.value = ""; 
    address.value = "";
}

// ===== ADMIN FUNCTIONS =====
function showBookings(){
    let html = "<tr><th>Name</th><th>Phone</th><th>Service</th><th>Status</th><th>Tech</th></tr>";
    bookings.forEach((b, i) => {
        html += `<tr>
            <td>${b.name}</td>
            <td>${b.phone}</td>
            <td>${b.service}</td>
            <td>${b.status}</td>
            <td>${b.tech || "Not Assigned"}</td>
        </tr>`;
    });
    table.innerHTML = html;
}

function showUsers(){
    let html = "<tr><th>Phone</th><th>Status</th><th>Action</th></tr>";
    users.forEach((u, i) => {
        if(u.role == "technician"){
            html += `<tr>
                <td>${u.phone}</td>
                <td>${u.approved ? "✅ Approved" : "⏳ Pending"}</td>
                <td>${!u.approved ? `<button onclick="approve(${i})" style="background:orange;">Approve</button>` : "Approved"}</td>
            </tr>`;
        }
    });
    table.innerHTML = html;
}

function approve(i){
    users[i].approved = true;
    localStorage.setItem("users", JSON.stringify(users));
    alert("Approved ✅");
    showUsers();
}

// ===== TECHNICIAN FUNCTIONS =====
function showMyJobs(){
    let currentUser = JSON.parse(localStorage.getItem("currentUser"));
    let html = "";
    let totalEarnings = 0;
    
    bookings.forEach((b, i) => {
        // Available jobs
        if(!b.tech){
            html += `<tr>
                <td>${b.name}</td>
                <td>${b.phone}</td>
                <td>${b.service}</td>
                <td><button onclick="takeJob(${i})" style="background:#3b82f6;">Accept Job</button></td>
            </tr>`;
        }
        // My assigned jobs
        else if(b.tech == currentUser.phone){
            let labour = b.labour || 0;
            let extra = b.extra || 0;
            totalEarnings += (labour + extra);
            
            html += `<tr style="background:#1e293b;">
                <td>${b.name}</td>
                <td>${b.service}</td>
                <td>✅ Assigned</td>
                <td>
                    Labour: <input id="labour${i}" placeholder="₹ Amount" style="width:60px;">
                    Part: <input id="part${i}" placeholder="Part name" style="width:80px;">
                    Extra: <input id="extra${i}" placeholder="₹ Cost" style="width:60px;">
                    <br><button onclick="addCharges(${i})" style="background:#eab308;">Add Charges</button>
                    <button onclick="makeBill(${i})" style="background:#ef4444;">Generate Bill</button>
                </td>
            </tr>`;
        }
    });
    
    earn.innerText = totalEarnings;
    myjobs.innerHTML = html;
}

function takeJob(i){
    let currentUser = JSON.parse(localStorage.getItem("currentUser"));
    if(bookings[i].tech){
        alert("Already assigned ❌");
        return;
    }
    bookings[i].tech = currentUser.phone;
    bookings[i].status = "Assigned";
    localStorage.setItem("data", JSON.stringify(bookings));
    showMyJobs();
}

function addCharges(i){
    let labour = parseInt(document.getElementById("labour" + i)?.value) || 0;
    let part = document.getElementById("part" + i)?.value || "No Part";
    let extra = parseInt(document.getElementById("extra" + i)?.value) || 0;
    
    bookings[i].labour = labour;
    bookings[i].part = part;
    bookings[i].extra = extra;
    localStorage.setItem("data", JSON.stringify(bookings));
    alert("Charges Added ✅");
    showMyJobs();
}

function makeBill(i){
    let b = bookings[i];
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();
    
    let labour = b.labour || 0;
    let extra = b.extra || 0;
    let total = (labour + extra > 0) ? (labour + extra - visitingCharge) : visitingCharge;
    
    doc.text("🔧 FixEasy Bill", 20, 20);
    doc.text("Customer: " + b.name, 20, 40);
    doc.text("Phone: " + b.phone, 20, 60);
    doc.text("Service: " + b.service, 20, 80);
    doc.text("Technician: " + b.tech, 20, 100);
    doc.text("Labour: ₹" + labour, 20, 120);
    doc.text("Parts: " + b.part, 20, 140);
    doc.text("Extra: ₹" + extra, 20, 160);
    doc.text("Visiting(-): ₹" + visitingCharge, 20, 180);
    doc.text("TOTAL: ₹" + total, 20, 200);
    
    doc.save("FixEasy_Bill_" + b.name + ".pdf");
}

// ===== PAGE LOAD =====
window.onload = function(){
    // Default: Sirf Login + Booking dikhe
    document.getElementById("bookingBox").style.display = "block";
    document.getElementById("adminPanel").classList.add("hidden");
    document.getElementById("techPanel").classList.add("hidden");
    
    // Agar pehle se logged in hai to show karo
    let currentRole = localStorage.getItem("role");
    let currentUser = localStorage.getItem("currentUser");
    
    if(currentRole == "admin" && currentUser){
        document.getElementById("adminPanel").classList.remove("hidden");
        showBookings();
    }
    else if(currentRole == "technician" && currentUser){
        document.getElementById("techPanel").classList.remove("hidden");
        showMyJobs();
    }
}
</script>
</body>
</html>
